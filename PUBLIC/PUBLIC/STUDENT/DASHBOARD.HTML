<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Campus-Eye</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <nav class="navbar">
        <div class="logo">🏫 Campus-Eye</div>
        <div class="nav-links">
            <span id="userName"></span>
            <a href="report.html">Report Issue</a>
            <a href="my-complaints.html">My Complaints</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Campus Issue Map</h2>
        <div id="map"></div>
        
        <div class="quick-actions">
            <a href="report.html" class="btn-primary">+ Report New Issue</a>
            <a href="my-complaints.html" class="btn-secondary">View My Complaints</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Auth check
        if (!localStorage.getItem('studentName')) {
            window.location.href = 'login.html';
        }
        document.getElementById('userName').textContent = '👤 ' + localStorage.getItem('studentName');

        // Init map (center on campus - adjust coordinates)
        const map = L.map('map').setView([28.6139, 77.2090], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Load complaints and add markers
        async function loadComplaints() {
            try {
                const res = await fetch('/api/complaints');
                const complaints = await res.json();
                
                complaints.forEach(c => {
                    const color = c.status === 'Resolved' ? 'green' : 
                                 c.status === 'In Progress' ? 'orange' : 'red';
                    
                    L.circleMarker([c.lat || 28.6139, c.lng || 77.2090], {
                        radius: 10,
                        fillColor: color,
                        color: color,
                        fillOpacity: 0.7
                    }).addTo(map)
                    .bindPopup(`<b>${c.title}</b><br>${c.location}<br>Status: ${c.status}`);
                });
            } catch (err) {
                console.error('Error loading complaints:', err);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '../index.html';
        }

        loadComplaints();
    </script>
</body>
</html>

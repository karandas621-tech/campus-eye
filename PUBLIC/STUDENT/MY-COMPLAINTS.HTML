 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Complaints - Campus-Eye</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🏫 Campus-Eye</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="report.html">Report</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>My Complaints</h2>
        <div id="list"></div>
    </div>

    <script>
        if (!localStorage.getItem('studentName')) location.href = 'login.html';

        async function load() {
            const res = await fetch('/api/complaints');
            const all = await res.json();
            const mine = all.filter(c => c.studentName === localStorage.getItem('studentName'));

            document.getElementById('list').innerHTML = mine.length ? mine.map(c => `
                <div class="card">
                    <b>#${c._id.toString().slice(-4)}</b> 
                    <span class="badge ${c.status.toLowerCase().replace(' ', '-')}">${c.status}</span>
                    <h3>${c.title}</h3>
                    <p>📍 ${c.location} | 🏷️ ${c.category}</p>
                    <p>${c.description}</p>
                    <small>📅 ${new Date(c.createdAt).toLocaleDateString()}</small>
                </div>
            `).join('') : '<p>No complaints yet. <a href="report.html">Report one!</a></p>';
        }

        function logout() {
            localStorage.clear();
            location.href = '../index.html';
        }

        load();
    </script>
</body>
</html>

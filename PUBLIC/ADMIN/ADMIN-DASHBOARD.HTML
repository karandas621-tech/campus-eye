 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Campus-Eye</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <nav class="navbar">
        <div class="logo">🏫 Campus-Eye Admin</div>
        <a href="#" onclick="logout()">Logout</a>
    </nav>

    <div class="container">
        <h2>Complaint Management</h2>
        
        <button class="btn" onclick="filter('all')">All</button>
        <button class="btn" onclick="filter('Pending')">Pending</button>
        <button class="btn" onclick="filter('In Progress')">In Progress</button>
        <button class="btn" onclick="filter('Resolved')">Resolved</button>

        <div id="map"></div>

        <h3>All Complaints</h3>
        <div id="list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
    <script>
        if (!localStorage.getItem('adminLoggedIn')) location.href = 'admin-login.html';

        let map, heat, currentFilter = 'all';

        map = L.map('map').setView([28.6139, 77.2090], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function load() {
            const res = await fetch('/api/complaints');
            const data = await res.json();

            if (heat) map.removeLayer(heat);
            const points = data.map(c => [c.lat, c.lng, 0.5]);
            if (points.length) heat = L.heatLayer(points, {radius: 50, blur: 30}).addTo(map);

            const filtered = currentFilter === 'all' ? data : data.filter(c => c.status === currentFilter);
            
            document.getElementById('list').innerHTML = filtered.map(c => `
                <div class="card">
                    <b>#${c._id.toString().slice(-4)}</b> - ${c.title}
                    <p>📍 ${c.location} | 👤 ${c.studentName} | <span class="badge ${c.status.toLowerCase().replace(' ', '-')}">${c.status}</span></p>
                    <select onchange="updateStatus('${c._id}', this.value)">
                        <option value="">Change Status</option>
                        <option ${c.status === 'Pending' ? 'selected' : ''}>Pending</option>
                        <option ${c.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                        <option ${c.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
                    </select>
                </div>
            `).join('');
        }

        async function updateStatus(id, status) {
            if (!status) return;
            await fetch(`/api/complaints/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status})
            });
            load();
        }

        function filter(status) {
            currentFilter = status;
            load();
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            location.href = '../index.html';
        }

        load();
        setInterval(load, 10000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusEye - Report Issue</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <div class="logo-icon">👁️</div>
      <span>CampusEye</span>
    </div>
    <div class="nav-links" id="navLinks">
      <a href="/dashboard" id="nav-dashboard">Dashboard</a>
      <a href="/report" id="nav-report">Report Issue</a>
      <a href="/my-complaints" id="nav-my">My Complaints</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="user-info" id="userInfo"></div>
  </nav>

  <div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
      <div class="card-header">
        <h1 class="card-title">📝 Report Campus Issue</h1>
      </div>
      
      <form id="reportForm">
        <div class="form-group">
          <label>Issue Title *</label>
          <input type="text" id="title" placeholder="e.g., WiFi not working" required>
        </div>
        
        <div class="form-group">
          <label>Description *</label>
          <textarea id="description" placeholder="Describe the issue in detail..." required></textarea>
        </div>
        
        <div class="form-group">
          <label>Location *</label>
          <select id="location" required>
            <option value="">Select location</option>
            <option value="Hostel A">🏠 Hostel A</option>
            <option value="Hostel B">🏠 Hostel B</option>
            <option value="Hostel C">🏠 Hostel C</option>
            <option value="Library">📚 Library</option>
            <option value="Canteen">🍽️ Canteen</option>
            <option value="Academic Block">🏫 Academic Block</option>
            <option value="Sports Complex">⚽ Sports Complex</option>
            <option value="Parking">🚗 Parking</option>
            <option value="Main Gate">🚪 Main Gate</option>
            <option value="Auditorium">🎭 Auditorium</option>
            <option value="Lab Block">🔬 Lab Block</option>
            <option value="Medical Center">🏥 Medical Center</option>
            <option value="Gym">💪 Gym</option>
            <option value="Garden Area">🌳 Garden Area</option>
            <option value="ATM Area">💳 ATM Area</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Category *</label>
          <select id="category" required>
            <option value="">Select category</option>
            <option value="Network">🌐 Network</option>
            <option value="Electricity">⚡ Electricity</option>
            <option value="Water">💧 Water</option>
            <option value="Cleanliness">🧹 Cleanliness</option>
            <option value="Food">🍽️ Food</option>
            <option value="Security">🔒 Security</option>
            <option value="Infrastructure">🏗️ Infrastructure</option>
            <option value="Other">📌 Other</option>
          </select>
        </div>
        
        <button type="submit" class="btn btn-primary">Submit Complaint</button>
        <a href="/dashboard" class="btn" style="margin-top:10px; background:#e0e0e0; color:#333; text-decoration:none; display:inline-block; text-align:center;">Cancel</a>
      </form>
    </div>
  </div>

  <script src="/main.js"></script>
  <script>
    const user = requireAuth();
    if (!user) window.location.href = '/login';
    
    document.getElementById('reportForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value;
      const description = document.getElementById('description').value;
      const location = document.getElementById('location').value;
      const category = document.getElementById('category').value;
      const coords = CAMPUS_LOCATIONS[location];
      
      try {
        const res = await fetch(`${API_BASE}/complaints`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title, description, location, category,
            studentId: user.userId,
            studentName: user.name,
            lat: coords ? coords.lat : null,
            lng: coords ? coords.lng : null
          })
        });
        if (res.ok) {
          showToast('Complaint submitted successfully!');
          setTimeout(() => window.location.href = '/my-complaints', 1000);
        } else { showToast('Failed to submit complaint', 'error'); }
      } catch (err) { showToast('Server error. Is the backend running?', 'error'); }
    });
  </script>
</body>
</html>

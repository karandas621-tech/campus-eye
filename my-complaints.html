<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusEye - My Complaints</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <div class="logo-icon">👁️</div>
      <span>CampusEye</span>
    </div>
    <div class="nav-links" id="navLinks">
      <a href="/dashboard" id="nav-dashboard">Dashboard</a>
      <a href="/report" id="nav-report">Report Issue</a>
      <a href="/my-complaints" id="nav-my">My Complaints</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="user-info" id="userInfo"></div>
  </nav>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h1 class="card-title">📋 My Complaints</h1>
        <a href="/report" class="btn btn-primary btn-sm" style="width:auto; text-decoration:none; display:inline-block;">+ New Complaint</a>
      </div>
    </div>

    <div id="complaintsList" class="complaints-grid">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <script src="/main.js"></script>
  <script>
    const user = requireAuth();
    if (!user) window.location.href = '/login';
    
    async function loadComplaints() {
      try {
        const res = await fetch(`${API_BASE}/complaints/my/${user.userId}`);
        const complaints = await res.json();
        const container = document.getElementById('complaintsList');
        
        if (complaints.length === 0) {
          container.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">📭</div><h3>No complaints yet</h3><p>Start by reporting your first campus issue!</p><a href="/report" class="btn btn-primary" style="width:auto; display:inline-block; margin-top:15px; text-decoration:none;">Report Issue</a></div>`;
          return;
        }
        
        container.innerHTML = complaints.map(c => `
          <div class="complaint-card ${c.status.toLowerCase().replace(' ', '-')}">
            <div class="complaint-header">
              <span class="complaint-id">#${c._id.slice(-4).toUpperCase()}</span>
              <span class="complaint-status status-${c.status.toLowerCase().replace(' ', '-')}">${c.status}</span>
            </div>
            <div class="complaint-title">${c.title}</div>
            <div class="complaint-desc">${c.description}</div>
            <div class="complaint-meta">
              <span>📍 ${c.location}</span>
              <span>📁 ${c.category}</span>
            </div>
            <div class="complaint-meta">
              <span>📅 ${formatDate(c.createdAt)}</span>
              ${c.updatedAt !== c.createdAt ? `<span>🔄 Updated: ${formatDate(c.updatedAt)}</span>` : ''}
            </div>
          </div>
        `).join('');
      } catch (err) { showToast('Failed to load complaints', 'error'); }
    }
    loadComplaints();
  </script>
</body>
</html>

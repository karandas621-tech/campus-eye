<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusEye - Student Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <div class="logo-icon">👁️</div>
        <span>CampusEye</span>
      </div>
      <h2>Student Login</h2>
      <p>Report campus issues, track status, stay informed</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="student@campus.edu" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      
      <div class="auth-footer">
        <p>Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
        <p style="margin-top:10px"><a href="/admin-login">Login as Admin</a></p>
      </div>
    </div>
  </div>

  <div id="registerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div class="auth-card" style="max-width:420px; margin:0;">
      <h2>Student Registration</h2>
      <p>Create your CampusEye account</p>
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="student@campus.edu" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
        <button type="button" class="btn" style="margin-top:10px; background:#e0e0e0; color:#333;" onclick="hideRegister()">Cancel</button>
      </form>
    </div>
  </div>

  <script src="/main.js"></script>
  <script>
    const user = getUser();
    if (user) { window.location.href = user.role === 'admin' ? '/admin-dashboard' : '/dashboard'; }

    function showRegister() { document.getElementById('registerModal').style.display = 'flex'; }
    function hideRegister() { document.getElementById('registerModal').style.display = 'none'; }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          setUser(data);
          showToast('Login successful!');
          setTimeout(() => window.location.href = '/dashboard', 800);
        } else { showToast(data.message || 'Login failed', 'error'); }
      } catch (err) { showToast('Server error. Is the backend running?', 'error'); }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          setUser(data);
          showToast('Registration successful!');
          setTimeout(() => window.location.href = '/dashboard', 800);
        } else { showToast(data.message || 'Registration failed', 'error'); }
      } catch (err) { showToast('Server error. Is the backend running?', 'error'); }
    });
  </script>
</body>
</html>

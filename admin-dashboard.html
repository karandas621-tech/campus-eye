<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusEye - Admin Dashboard</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <div class="logo-icon">👁️</div>
      <span>CampusEye <span style="font-size:12px; color:var(--danger);">ADMIN</span></span>
    </div>
    <div class="nav-links" id="navLinks">
      <a href="/admin-dashboard" id="nav-dashboard">Dashboard</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="user-info" id="userInfo"></div>
  </nav>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">📋</div>
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">Total Complaints</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">⏳</div>
        <div class="stat-value" id="pendingCount">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div class="stat-value" id="resolvedCount">0</div>
        <div class="stat-label">Resolved</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">🔥</div>
        <div class="stat-value" id="hotspotCount">0</div>
        <div class="stat-label">Hotspots</div>
      </div>
    </div>

    <div class="card" id="map-section">
      <div class="card-header">
        <h2 class="card-title">🔥 Campus Heatmap</h2>
      </div>
      <div class="legend">
        <span style="font-weight:600;">Complaint Density:</span>
        <div class="legend-item"><div class="legend-dot dot-red"></div>High (5+)</div>
        <div class="legend-item"><div class="legend-dot dot-yellow"></div>Medium (2-4)</div>
        <div class="legend-item"><div class="legend-dot dot-green"></div>Low (0-1)</div>
      </div>
      <div class="map-container">
        <div id="map"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 class="card-title">📋 All Complaints</h2>
        <div>
          <select id="filterStatus" onchange="loadComplaints()" style="padding:8px 12px; border-radius:8px; border:2px solid #e0e0e0;">
            <option value="all">All Status</option>
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>
      </div>
      <div id="complaintsList" class="complaints-grid">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/main.js"></script>
  <script>
    const user = requireAdmin();
    if (!user) window.location.href = '/admin-login';
    let map;

    async function loadDashboard() {
      await loadComplaints();
      await loadHeatmap();
    }

    async function loadComplaints() {
      try {
        const res = await fetch(`${API_BASE}/complaints/all`);
        let complaints = await res.json();
        const filter = document.getElementById('filterStatus').value;
        if (filter !== 'all') complaints = complaints.filter(c => c.status === filter);
        
        const allRes = await fetch(`${API_BASE}/complaints/all`);
        const all = await allRes.json();
        document.getElementById('totalCount').textContent = all.length;
        document.getElementById('pendingCount').textContent = all.filter(c => c.status === 'Pending').length;
        document.getElementById('resolvedCount').textContent = all.filter(c => c.status === 'Resolved').length;
        const locationCounts = {};
        all.forEach(c => { locationCounts[c.location] = (locationCounts[c.location] || 0) + 1; });
        const hotspots = Object.entries(locationCounts).filter(([_, count]) => count >= 3);
        document.getElementById('hotspotCount').textContent = hotspots.length;

        const container = document.getElementById('complaintsList');
        if (complaints.length === 0) {
          container.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">📭</div><h3>No complaints found</h3></div>`;
          return;
        }
        container.innerHTML = complaints.map(c => `
          <div class="complaint-card ${c.status.toLowerCase().replace(' ', '-')}">
            <div class="complaint-header">
              <span class="complaint-id">#${c._id.slice(-4).toUpperCase()}</span>
              <span class="complaint-status status-${c.status.toLowerCase().replace(' ', '-')}">${c.status}</span>
            </div>
            <div class="complaint-title">${c.title}</div>
            <div class="complaint-desc">${c.description}</div>
            <div class="complaint-meta">
              <span>👤 ${c.studentName}</span>
              <span>📍 ${c.location}</span>
              <span>📁 ${c.category}</span>
            </div>
            <div class="complaint-meta">
              <span>📅 ${formatDate(c.createdAt)}</span>
            </div>
            <div class="complaint-actions">
              <select onchange="updateStatus('${c._id}', this.value)" style="flex:1;">
                <option value="" disabled selected>Change Status</option>
                <option value="Pending">⏳ Pending</option>
                <option value="In Progress">🔧 In Progress</option>
                <option value="Resolved">✅ Resolved</option>
              </select>
              <button class="btn btn-danger btn-sm" onclick="deleteComplaint('${c._id}')">🗑️</button>
            </div>
          </div>
        `).join('');
      } catch (err) { showToast('Failed to load complaints', 'error'); }
    }

    async function loadHeatmap() {
      const res = await fetch(`${API_BASE}/complaints/all`);
      const complaints = await res.json();
      const locationCounts = {};
      complaints.forEach(c => { locationCounts[c.location] = (locationCounts[c.location] || 0) + 1; });
      if (map) map.remove();
      map = L.map('map').setView([28.6135, 77.2085], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
      Object.entries(CAMPUS_LOCATIONS).forEach(([name, coords]) => {
        const count = locationCounts[name] || 0;
        let color, radius, opacity;
        if (count >= 5) { color = '#ff4444'; radius = 50; opacity = 0.5; }
        else if (count >= 2) { color = '#ffbb33'; radius = 35; opacity = 0.4; }
        else { color = '#00C851'; radius = 20; opacity = 0.3; }
        L.circle(coords, { color: color, fillColor: color, fillOpacity: opacity, radius: radius, weight: 3 }).addTo(map).bindPopup(`<b>${name}</b><br>${count} complaint${count !== 1 ? 's' : ''}`);
        if (count >= 3) {
          L.circle(coords, { color: color, fillColor: color, fillOpacity: 0.1, radius: radius * 2, weight: 1, dashArray: '5, 10' }).addTo(map);
        }
      });
    }

    async function updateStatus(id, status) {
      try {
        const res = await fetch(`${API_BASE}/complaints/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        if (res.ok) { showToast(`Status updated to ${status}`); loadDashboard(); }
      } catch (err) { showToast('Failed to update status', 'error'); }
    }

    async function deleteComplaint(id) {
      if (!confirm('Delete this complaint?')) return;
      try {
        const res = await fetch(`${API_BASE}/complaints/${id}`, { method: 'DELETE' });
        if (res.ok) { showToast('Complaint deleted'); loadDashboard(); }
      } catch (err) { showToast('Failed to delete', 'error'); }
    }

    loadDashboard();
  </script>
</body>
</html>

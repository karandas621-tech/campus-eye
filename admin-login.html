<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusEye - Admin Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <div class="logo-icon">👁️</div>
        <span>CampusEye</span>
      </div>
      <h2>Admin Login</h2>
      <p>Campus administration dashboard access</p>
      
      <form id="adminLoginForm">
        <div class="form-group">
          <label>Admin Email</label>
          <input type="email" id="email" placeholder="admin@campuseye.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login as Admin</button>
      </form>
      
      <div class="auth-footer">
        <p><a href="/login">← Back to Student Login</a></p>
        <p style="margin-top:15px; font-size:12px; color:#999;">
          Default: admin@campuseye.com / admin123<br>
          <a href="#" onclick="seedAdmin()" style="color:var(--primary);">Create Admin Account</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/main.js"></script>
  <script>
    const user = getUser();
    if (user && user.role === 'admin') { window.location.href = '/admin-dashboard'; }

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const res = await fetch(`${API_BASE}/auth/admin-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          setUser(data);
          showToast('Admin login successful!');
          setTimeout(() => window.location.href = '/admin-dashboard', 800);
        } else { showToast(data.message || 'Login failed', 'error'); }
      } catch (err) { showToast('Server error', 'error'); }
    });
    
    async function seedAdmin() {
      try {
        const res = await fetch(`${API_BASE}/auth/seed-admin`, { method: 'POST' });
        const data = await res.json();
        showToast(data.message);
      } catch (err) { showToast('Failed to create admin', 'error'); }
    }
  </script>
</body>
</html>
